<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Center everything */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Button */
button {
    padding: 15px 25px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    background: white;
    color: #ff4b7d;
    cursor: pointer;
}

/* Hidden sections */
.page {
    display: none;
}

.active {
    display: flex;
}

/* Heart animation */
.heart {
    position: absolute;
    color: pink;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="container page active" id="page1">
    <h1>🎁 Tap to Open</h1>
    <button onclick="nextPage()">Open</button>
</div>

<!-- PAGE 2 -->
<div class="container page" id="page2">
    <h2>Hey Beautiful 💖</h2>
    <p>Someone has a special message for you...</p>
    <button onclick="nextPage()">Next</button>
</div>

<!-- PAGE 3 -->
<div class="container page" id="page3">
    <h1>🎂 Happy Birthday 🎂</h1>
    <p>You are amazing, special, and loved ❤️</p>
    <button onclick="playMusic()">Play Surprise 🎶</button>
</div>

<audio id="music" src="your-music.mp3"></audio>

<script>
let currentPage = 1;

function nextPage() {
    document.getElementById("page" + currentPage).classList.remove("active");
    currentPage++;
    document.getElementById("page" + currentPage).classList.add("active");
}

// Floating hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);

function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
