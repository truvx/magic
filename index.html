<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Magic Lamp</title>

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: gold;
            font-family: Arial;
            overflow: hidden;
        }

        #lamp {
            width: 250px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #lamp:hover {
            transform: scale(1.05);
        }

        #text {
            margin-top: 20px;
            font-size: 24px;
        }

        /* PRANK IMAGE */
        #prankImage {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            top: 0;
            left: 0;
        }

        /* SCREEN SHAKE */
        @keyframes shake {
            0% {
                transform: translate(0, 0);
            }

            20% {
                transform: translate(-5px, 5px);
            }

            40% {
                transform: translate(5px, -5px);
            }

            60% {
                transform: translate(-5px, -5px);
            }

            80% {
                transform: translate(5px, 5px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .shake {
            animation: shake 0.15s infinite;
        }
    </style>
</head>

<body>

    <div id="startScreen" onclick="startPrank()">
        <img id="lamp" src="lamp.png">
        <div id="text">✨ Rub The Lamp ✨</div>
    </div>

    <img id="prankImage" src="prank.jpg">

    <audio id="sound" src="audio.mp3" loop></audio>

    <script>
        function startPrank() {
            const audio = document.getElementById("sound");
            const img = document.getElementById("prankImage");

            // hide start screen
            document.getElementById("startScreen").style.display = "none";

            // show image
            img.style.display = "block";

            // AUDIO UNLOCK + PLAY
            audio.muted = true;
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                audio.muted = false;
                audio.volume = 1;
                audio.play();
            }).catch(() => { });

            // SCREEN SHAKE
            document.body.classList.add("shake");

            // VIBRATION (mobile)
            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 500, 200, 800]);
            }

            // FLASH EFFECT
            setInterval(() => {
                document.body.style.background =
                    document.body.style.background === "black" ? "white" : "black";

                img.style.opacity =
                    img.style.opacity == 1 ? 0.3 : 1;

            }, 80);

            // FULLSCREEN
            document.documentElement.requestFullscreen().catch(() => { });
        }
    </script>

</body>

</html>
